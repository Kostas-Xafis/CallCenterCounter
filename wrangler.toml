name = "call-center-counter"
main = "src/index.ts"
compatibility_date = "2026-03-02"

[vars]
APP_ENV = "development"
SESSION_COOKIE_NAME = "cc_session"
AUTH_PEPPER = "replace-in-secrets"

[[d1_databases]]
binding = "DB"
database_name = "call_center_dev"
database_id = "replace-with-your-d1-id"

[env.production.vars]
APP_ENV = "production"
SESSION_COOKIE_NAME = "cc_session"

[[env.production.d1_databases]]
binding = "DB"
database_name = "call_center_prod"
database_id = "replace-with-your-production-d1-id"
