name = "call-center-counter"
main = "dist/_worker.js"
compatibility_date = "2026-03-02"

[assets]
directory = "./dist"

[vars]
APP_ENV = "development"
SESSION_COOKIE_NAME = "cc_session"

[[d1_databases]]
binding = "DB"
database_name = "call_center_dev"
database_id = "replace-with-your-d1-id"

[env.production.vars]
APP_ENV = "production"
SESSION_COOKIE_NAME = "cc_session"

[[env.production.d1_databases]]
binding = "DB"
database_name = "call_center_prod"
database_id = "36010f29-3c03-40cf-bc44-b4d7652693dc"

